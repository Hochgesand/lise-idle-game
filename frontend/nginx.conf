# nginx.conf — Lise Dev Idle Game frontend (static SPA serve)
# Task T056 (front-loaded from Phase 6 so a deploy can run after each phase).
#
# The frontend is a single-page app: the Vite build emits index.html + hashed
# JS/CSS into dist/, and nginx serves those static files with an SPA fallback
# (any unmatched route returns index.html so client-side routing never 404s).
#
# The backend API lives on a SEPARATE Traefik host (lise-game-api.schmitz.gg);
# this container does NOT proxy to it. The frontend discovers the API base URL
# at runtime via its own config/env (wired in T030 REST client), so all nginx
# has to do here is serve static files.
#
# Run as non-root: nginx in the official alpine image already drops the master
# worker into a low-privilege worker; we bind to 80 (the default unprivileged
# port inside the container, mapped by Traefik to the host's websecure entrypoint).

# A single event + http block is required. We keep this minimal and explicit.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Sensible logging + keepalive for a static host.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
    sendfile    on;
    keepalive_timeout 65;

    # Compress text payloads (JS/CSS/HTML) to shrink the bundle over the wire.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 80;
        # The container only knows its internal interface; Traefik handles the
        # external hostname (lise-game.schmitz.gg), so server_name is left open.
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: serve the file if it exists, else the directory, else
        # fall back to index.html so deep links / client routes never 404.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Vite emits content-hashed assets under /assets — they are immutable
        # per hash, so a long cache is safe and correct.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
