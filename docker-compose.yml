# docker-compose.yml — Lise Dev Idle Game
#
# ── Image strategy ────────────────────────────────────────────────────────
# Each service has BOTH an `image:` (GHCR, CI-built) and a `build:` block
# (local build context). This means:
#   docker compose pull   -> pulls the prebuilt CI image from GHCR (prod deploy)
#   docker compose build  -> builds locally from source (dev / offline)
# CI builds them in .github/workflows/docker-publish.yml and pushes to:
#   ghcr.io/hochgesand/lise-game-backend:latest
#   ghcr.io/hochgesand/lise-game-frontend:latest
# The host therefore deploys via `docker compose pull && docker compose up -d`
# (see .claude/skills/deploy-lise-game/SKILL.md); `docker compose build` is
# the documented fallback when a pull fails (image not yet built / package
# not public). For the host to pull without auth the GHCR packages must be
# PUBLIC (or the host runs `docker login ghcr.io` once).
# ─────────────────────────────────────────────────────────────────────────
#
# Two-service stack deployed on the Unraid host (root@schmitz.gg:2222,
# appdata /mnt/user/appdata/lise-game). The host already runs
# **Nginx Proxy Manager** (NPM, container `nginx_proxy_webui-app-1`,
# owning host ports 80/443) as the reverse proxy. NPM is NOT Traefik and
# there is no shared proxy Docker network, so — like the host's other
# apps (e.g. planning-poker) — these containers simply PUBLISH host ports
# and NPM proxy hosts map the public domains onto them:
#
#   lise-game.schmitz.gg       ->  <host>:8087   (frontend, nginx static)
#   lise-game-api.schmitz.gg   ->  <host>:8086   (backend, /api + /ws)
#                                 (enable "Websockets Support" on the API
#                                  proxy host for the STOMP /ws endpoint)
#
# NPM proxy hosts + Let's Encrypt certs are configured in the NPM UI/API,
# NOT here. SSL termination happens at NPM; traffic to the containers is HTTP.
#
# Bring up on the host:        docker compose up -d
# Validate the YAML:           docker compose config -q
#
# NOTE — non-root /data ownership (IMPORTANT):
#   The backend image (backend/Dockerfile) runs as a non-root user `lise`
#   (uid=100, gid=101). The bind-mounted /mnt/user/appdata/lise-game/data dir
#   (-> /data) MUST be writable by uid 100 so H2 can create gamedb.* files.
#   On the Unraid host create it BEFORE the first `docker compose up`:
#       mkdir -p /mnt/user/appdata/lise-game/data
#       chown -R 100:101 /mnt/user/appdata/lise-game/data
#   Container security is NOT weakened (we keep USER lise).

services:
  backend:
    build:
      context: ./backend
    # CI-built image (GHCR). `pull` fetches this; `build` uses ./backend.
    image: ghcr.io/hochgesand/lise-game-backend:latest
    container_name: lise-game-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Persist H2 data under the bind-mounted /data volume.
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/gamedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      # --- Keycloak / OAuth2 resource server (backend acts as resource server) ---
      # Client id + issuer are reserved for the resource server config.
      # The client SECRET is interpolated from the untracked host-side .env
      # (gitignored) — no real secret value is committed here.
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://keycloak.novitasoft.de/realms/LiseIdler
      - KEYCLOAK_BACKEND_CLIENT_ID=lise-idler-backend
      - KEYCLOAK_BACKEND_CLIENT_SECRET=${KEYCLOAK_BACKEND_CLIENT_SECRET}
    ports:
      # NPM proxies lise-game-api.schmitz.gg (/api + /ws) onto host :8086.
      # Matches the host convention (apps publish a host port; NPM maps the
      # domain onto it). Backend listens on 8080 inside the container.
      - "8086:8080"
    volumes:
      # Durable backend state (H2 db files, saves) on the Unraid appdata share.
      # Lives in a `data/` subfolder so the deploy dir's docker-compose.yml/.env
      # are NOT exposed inside the container at /data.
      - /mnt/user/appdata/lise-game/data:/data

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the Vite bundle at build time (VITE_* → import.meta.env).
        # Backend API + WebSocket live on the separate API host (NPM proxies it).
        - VITE_API_BASE_URL=https://lise-game-api.schmitz.gg
        - VITE_WS_BASE_URL=wss://lise-game-api.schmitz.gg/ws
    # CI-built image (GHCR). `pull` fetches this; `build` uses ./frontend.
    image: ghcr.io/hochgesand/lise-game-frontend:latest
    container_name: lise-game-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # NPM proxies lise-game.schmitz.gg onto host :8087. nginx serves the
      # Vite build on container port 80.
      - "8087:80"
