spring:
  application:
    name: lise-idle-backend

  security:
    oauth2:
      resourceserver:
        jwt:
          # The backend is a stateless OAuth2 resource server validating
          # LiseIdler-issued JWTs (contracts §2). The JWK set is resolved
          # lazily from this issuer's OIDC metadata on the first real JWT;
          # contract tests use spring-security-test MOCK JWTs (no network).
          issuer-uri: https://keycloak.novitasoft.de/realms/LiseIdler

  datasource:
    # Dev default: in-memory H2 in PostgreSQL compatibility mode. Prod is
    # driven by SPRING_DATASOURCE_* env vars (see docker-compose.yml).
    url: jdbc:h2:mem:gamedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true

server:
  port: 8080
